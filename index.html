<!DOCTYPE html>
<html>
<head>
    <title>DevOps Demo</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .box {
            padding: 20px;
            background: white;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🚀 DevOps CI/CD Demo</h1>
    <p>This app is deployed using GitHub Actions</p>

    <h3 id="time"></h3>
</div>

<script>
    document.getElementById("time").innerText =
        "Last Updated: " + new Date().toLocaleString();
</script>

</body>
</html>
